<div class="d-flex flex-column h-100 p-0 m-0">
  <div class="">
    <dx-validation-group #validationGroup>
      <div class="row gap-0 ms-1">
        <div class="col-md-4">
          <dx-text-box
            [(value)]="HeadCode"
            label="Code"
            labelMode="floating"
            placeholder="Code"
            stylingMode="outlined"
            class="headcode-box"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Ledger is required"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>

        <div class="col-md-6">
          <dx-text-box
            [(value)]="HeadName"
            label="Description"
            labelMode="floating"
            placeholder="Ledger"
            stylingMode="outlined"
            class="w-100"
          >
            <dx-validator>
              <dxi-validation-rule
                type="required"
                message="Ledger is required"
              ></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>

        <div *ngIf="isEditing" class="col-md-2 mt-3">
          <dx-check-box
            text="Inactive"
            iconSize="20"
            [(value)]="IsinActive"
          ></dx-check-box>
        </div>
      </div>
    </dx-validation-group>
    <hr class="my-3" />
  </div>
  <div class="d-flex flex-row gap-3 flex-grow-1">
    <div
      class="single-column-form d-flex flex-column flex-grow-1 border rounded"
    >
      <div class="flex-grow-1 overflow-hidden rounded p-1 mt-1">
        <dx-data-grid
          [dataSource]="GridDataSource"
          [showBorders]="true"
          [columnAutoWidth]="true"
          [rowAlternationEnabled]="true"
          [height]="'75vh'"
          [rowHeight]="40"
          (onRowValidating)="onRowValidating($event)"
          (onRowInserted)="onRowInserted($event)"
          (onEditorPreparing)="onEditorPreparing($event)"
          (onCellValueChanged)="onCellValueChanged($event)"
        >
          <dxo-toolbar>
            <dxi-item location="before">
              <div class="d-flex align-items-center h-100">
                <p class="mb-0 fs-4">Cost Allocation</p>
              </div>
            </dxi-item>
            <dxi-item class="mt-0 me-2" location="after">
              <div class="d-flex align-items-center h-100 mt-0">
                <dx-drop-down-box
                  class="mt-0"
                  labelMode="floating"
                  labelLocation="left"
                  label="Select Facility"
                  [(value)]="Facility_Value"
                  valueExpr="FacilityLicense"
                  displayExpr="FacilityName"
                  [showClearButton]="true"
                  [dataSource]="Facility_DataSource"
                  [width]="'200'"
                  (onValueChanged)="onFacilityChange($event)"
                  [dropDownOptions]="{ width: 'auto' }"
                >
                  <dx-validator #facilityValidator>
                    <dxi-validation-rule
                      type="required"
                      message="Facility selection is required."
                    ></dxi-validation-rule>
                  </dx-validator>
                  <div *dxTemplate="let data of 'content'">
                    <dx-data-grid
                      #facilityGrid
                      [dataSource]="Facility_DataSource"
                      keyExpr="FacilityLicense"
                      [columns]="[
                        {
                          dataField: 'FacilityLicense',
                          caption: 'License',
                          width: 'auto'
                        },
                        {
                          dataField: 'FacilityName',
                          caption: 'Name',
                          width: 'auto'
                        }
                      ]"
                      [selection]="{ mode: 'single' }"
                      [hoverStateEnabled]="true"
                      [paging]="{ enabled: true, pageSize: 10 }"
                      [filterRow]="{ visible: true }"
                      [headerFilter]="{ visible: true }"
                      [scrolling]="{ mode: 'virtual' }"
                      [height]="'auto'"
                      [(selectedRowKeys)]="Facility_Value"
                      (onRowPrepared)="onFacilityRowPrepared($event)"
                    ></dx-data-grid>
                  </div>
                </dx-drop-down-box>
              </div>
            </dxi-item>
            <dxi-item
              class="mt-4"
              location="after"
              widget="dxButton"
              [options]="{
                text: '',
                icon: 'bi bi-plus-circle-fill',
                hint: 'Add Row',
                elementAttr: { class: 'add-row' },
                type: 'default',
                stylingMode: 'contained',
                onClick: onAddRowClick
              }"
            ></dxi-item>
          </dxo-toolbar>

          <dxo-editing
            mode="cell"
            [allowUpdating]="true"
            [allowAdding]="true"
            [allowDeleting]="true"
            newRowPosition="last"
          ></dxo-editing>

          <dxi-column dataField="Department" caption="Department">
            <dxo-lookup
              [dataSource]="departmentDataSource"
              valueExpr="ID"
              displayExpr="Description"
            ></dxo-lookup>
            <dxi-validation-rule
              type="custom"
              [validationCallback]="validateDepartment"
              message="Department is required."
            ></dxi-validation-rule>
          </dxi-column>

          <dxi-column
            dataField="Percentage"
            caption="Percentage"
            dataType="number"
            [format]="customPercentageFormat"
          >
            <dxo-editor-options
              [min]="0"
              [max]="100"
              [showSpinButtons]="false"
            ></dxo-editor-options>
            <dxi-validation-rule
              type="custom"
              [validationCallback]="percentageValidation"
              message="Percentage Required"
            ></dxi-validation-rule>
          </dxi-column>

          <dxo-summary>
            <dxi-total-item
              column="Percentage"
              summaryType="sum"
              [valueFormat]="{ type: 'fixedPoint', precision: 2 }"
              displayFormat="Total: {0} %"
              alignment="right"
            ></dxi-total-item>
          </dxo-summary>
        </dx-data-grid>
      </div>
    </div>

    <div class="flex-grow-1 border rounded p-2 d-flex flex-column">
      <div class="mb-2 mt-2 d-flex justify-content-between align-items-center">
        <p class="mb-0 fs-4">Attached Ledger</p>
        <dx-button
          text="Attach Ledger"
          icon="bi bi-plus-circle-fill"
          type="default"
          stylingMode="contained"
          (onClick)="openLedgerPopup()"
        ></dx-button>
      </div>

      <dx-data-grid
        class="flex-grow-1"
        [dataSource]="AttachedLedgerDataSource"
        [showBorders]="true"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [height]="'70vh'"
        keyExpr="ID"
        [scrolling]="{ mode: 'virtual' }"
        (onRowRemoving)="onRowDeleteLedgerAttached($event.data)"
      >
        <dxo-editing
          *ngIf="isEditing"
          mode="row"
          [allowDeleting]="true"
          [useIcons]="true"
        >
        </dxo-editing>
        <dxi-column dataField="LedgerCode" caption="Code"></dxi-column>
        <dxi-column dataField="LedgerName" caption="Name"></dxi-column>
        <dxi-column dataField="Type" caption="Type"></dxi-column>
      </dx-data-grid>
    </div>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-2">
    <dx-button
      text="Cancel"
      stylingMode="outlined"
      type="normal"
      (onClick)="closePopup()"
    ></dx-button>
    <dx-button
      *ngIf="!isEditing"
      text="Save"
      (onClick)="saveLedgerGroup()"
      stylingMode="contained"
      type="default"
    ></dx-button>
    <dx-button
      *ngIf="isEditing"
      text="Update"
      (onClick)="updateLedgerGroup()"
      stylingMode="contained"
      type="default"
    ></dx-button>
  </div>
</div>

<dx-load-panel
  shadingColor="rgba(0,0,0,0.0)"
  [(visible)]="loadingVisible"
  [showIndicator]="true"
  [showPane]="true"
  [shading]="true"
  [hideOnOutsideClick]="false"
  [message]="'Loading...'"
>
</dx-load-panel>

<!-- Ledger Selection Popup -->
<dx-popup
  [(visible)]="ledgerPopupVisible"
  [width]="600"
  [height]="700"
  [showTitle]="true"
  title="Select Ledgers"
  [dragEnabled]="true"
  [closeOnOutsideClick]="false"
>
  <div class="d-flex flex-column h-100">
    <dx-data-grid
      class="flex-grow-1"
      [dataSource]="ledgerDropDownDataList"
      [selection]="{ mode: 'multiple' }"
      [hoverStateEnabled]="true"
      [columnAutoWidth]="true"
      [rowAlternationEnabled]="true"
      [height]="'80%'"
      [scrolling]="{ mode: 'virtual' }"
      [(selectedRowKeys)]="popupSelectedLedgerIds"
      keyExpr="ID"
    >
      <dxi-column dataField="LedgerCode" caption="Code"></dxi-column>
      <dxi-column dataField="LedgerName" caption="Name"></dxi-column>
      <dxi-column dataField="Type" caption="Type"></dxi-column>
    </dx-data-grid>

    <div class="d-flex justify-content-end mt-2 gap-2">
      <dx-button
        text="Cancel"
        stylingMode="outlined"
        type="normal"
        (onClick)="closeLedgerPopup()"
      ></dx-button>
      <dx-button
        text="Apply"
        stylingMode="contained"
        type="default"
        (onClick)="applyLedgerSelection()"
      ></dx-button>
    </div>
  </div>
</dx-popup>
