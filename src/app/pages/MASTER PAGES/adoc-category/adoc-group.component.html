<div class="view-wrapper list-page">
  <dx-data-grid
    class="grid theme-dependent"
    noDataText="No Data Available"
    height="82vh"
    [dataSource]="dataSource"
    [showBorders]="true"
    [allowColumnResizing]="true"
    [allowColumnReordering]="true"
    [rowAlternationEnabled]="true"
    rowAlternationInterval="2"
    (onExporting)="onExporting($event)"
    (onRowRemoving)="onRowRemoving($event)"
    (onRowUpdating)="onRowUpdating($event)"
  >
    <dxo-editing
      mode="popup"
      [allowUpdating]="menuPrevilage.CanEdit"
      [allowDeleting]="menuPrevilage.CanDelete"
      [allowAdding]="false"
    >
      <dxo-popup
        title="Edit ADOC Category"
        [showTitle]="true"
        [width]="500"
        [height]="'auto'"
      >
      </dxo-popup>

      <dxo-form [colCount]="1" labelMode="floating">
        <dxi-item dataField="GroupCode" [editorOptions]="{ readOnly: true }">
          <dxi-validation-rule
            type="required"
            message="Category Code is required"
          ></dxi-validation-rule>
        </dxi-item>

        <dxi-item dataField="GroupName">
          <dxi-validation-rule
            type="required"
            message="Category Name is required"
          ></dxi-validation-rule>
        </dxi-item>

        <dxi-item
          dataField="IsChargeable"
          editorType="dxSelectBox"
          [label]="{ visible: false }"
          [editorOptions]="{
            dataSource: chargeableList,
            valueExpr: 'ID',
            displayExpr: 'Name',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="Chargeable is required"
          ></dxi-validation-rule>
        </dxi-item>

        <dxi-item
          dataField="IsInactive"
          editorType="dxCheckBox"
          [label]="{ visible: false }"
          [editorOptions]="{
            text: 'Inactive',
          }"
        >
        </dxi-item>
      </dxo-form>
    </dxo-editing>

    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="showInfo"
      [showNavigationButtons]="showNavButtons"
    >
    </dxo-pager>

    <dxo-load-panel [showPane]="false"></dxo-load-panel>
    <dxo-scrolling mode="virtual"></dxo-scrolling>
    <dxo-sorting mode="multiple"></dxo-sorting>
    <dxo-header-filter [visible]="isFilterRowVisible">
      <dxo-search [enabled]="true"></dxo-search>
    </dxo-header-filter>
    <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>
    <dxo-column-chooser [enabled]="true" [height]="400"></dxo-column-chooser>
    <dxo-search-panel [visible]="true" placeholder=" Search"></dxo-search-panel>
    <dxo-export
      [enabled]="true"
      [allowExportSelectedData]="false"
      [formats]="['xlsx']"
    >
    </dxo-export>

    <dxo-toolbar>
      <dxi-item location="before">
        <div class="grid-header">ADOC Category</div>
      </dxi-item>
      <dxi-item
        location="after"
        locateInMenu="auto"
        showText="inMenu"
        widget="dxButton"
        [options]="{
          icon: isFilterRowVisible ? 'filter' : 'filter',
          hint: isFilterRowVisible ? 'Hide Filter Row' : 'Show Filter Row',
          onClick: toggleFilterRow,
          stylingMode: 'text',
          elementAttr: { class: 'commonButtons' },
        }"
      ></dxi-item>
      <dxi-item
        location="after"
        locateInMenu="auto"
        showText="inMenu"
        widget="dxButton"
        [options]="{
          text: 'Refresh',
          icon: 'refresh',
          hint: 'refresh',
          onClick: refresh,
          stylingMode: 'text',
        }"
      ></dxi-item>

      <dxi-item
        name="exportButton"
        location="after"
        cssClass="custom-export-button"
      ></dxi-item>
      <dxi-item
        location="after"
        widget="dxButton"
        [options]="addButtonOptions"
      ></dxi-item>
    </dxo-toolbar>

    <dxi-column dataField="GroupCode" caption="Category Code"></dxi-column>
    <dxi-column dataField="GroupName" caption="Category Name"></dxi-column>
    <dxi-column dataField="IsChargeable" caption="Chargeable">
      <dxo-lookup
        [dataSource]="chargeableList"
        valueExpr="ID"
        displayExpr="Name"
      ></dxo-lookup>
    </dxi-column>
    <dxi-column dataField="Status" caption="Status"></dxi-column>
    <dxi-column
      dataField="IsInactive"
      caption="Inactive"
      dataType="boolean"
      [visible]="false"
    ></dxi-column>
  </dx-data-grid>

  <!-- ========= new form popup ========= -->
  <dx-popup
    [(visible)]="isAddPopupVisible"
    title="New ADOC Category"
    [width]="500"
    [height]="'auto'"
    [showCloseButton]="true"
    [hideOnOutsideClick]="false"
    (onHiding)="onPopupHiding()"
  >
    <div *dxTemplate="let data of 'content'">
      <dx-form
        #addForm
        [formData]="newADOCGroup"
        labelMode="floating"
        validationGroup="adocGroupValidation"
      >
        <dxi-item
          dataField="GroupCode"
          editorType="dxTextBox"
          [label]="{ visible: false }"
          [editorOptions]="{
            label: 'Code',
            labelMode: 'floating',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="Category Code is required"
          ></dxi-validation-rule>
        </dxi-item>

        <dxi-item
          dataField="GroupName"
          editorType="dxTextBox"
          [label]="{ visible: false }"
          [editorOptions]="{
            label: 'Name',
            labelMode: 'floating',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="Category Name is required"
          ></dxi-validation-rule>
        </dxi-item>

        <dxi-item
          dataField="Chargeable"
          editorType="dxSelectBox"
          [label]="{ visible: false }"
          [editorOptions]="{
            label: 'Chargeable',
            labelMode: 'floating',
            dataSource: chargeableList,
            valueExpr: 'ID',
            displayExpr: 'Name',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="Chargeable is required"
          ></dxi-validation-rule>
        </dxi-item>
      </dx-form>

      <div class="mt-5 text-end">
        <dx-button
          text="Cancel"
          stylingMode="outlined"
          type="normal"
          (onClick)="isAddPopupVisible = false"
        ></dx-button>

        <dx-button
          class="ms-2"
          text="Save"
          stylingMode="contained"
          type="default"
          (onClick)="saveADOCGroup()"
        ></dx-button>
      </div>
    </div>
  </dx-popup>
</div>
