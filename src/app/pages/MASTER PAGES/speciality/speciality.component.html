<div class="view-wrapper list-page">
  <dx-data-grid
    class="grid theme-dependent"
    noDataText=""
    height="82vh"
    [dataSource]="dataSource"
    [showBorders]="true"
    [allowColumnResizing]="true"
    [allowColumnReordering]="true"
    [rowAlternationEnabled]="true"
    rowAlternationInterval="2"
    (onExporting)="onExporting($event)"
    (onRowRemoving)="onRowRemoving($event)"
    (onRowUpdating)="onRowUpdating($event)"
    height="82vh"
  >
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-editing
      mode="popup"
      [allowUpdating]="menuPrevilage.CanEdit"
      [allowDeleting]="menuPrevilage.CanDelete"
      [allowAdding]="menuPrevilage.CanAdd"
    >
      <dxo-popup
        title="Edit Speciality"
        [showTitle]="true"
        width="600"
        height="490"
      >
      </dxo-popup>

      <dxo-form [colCount]="2" labelMode="floating">
        <!-- Code -->
        <dxi-item dataField="SpecialityCode" [colSpan]="2">
          <dxi-validation-rule
            type="required"
            message="Speciality Code is required"
          ></dxi-validation-rule>
        </dxi-item>

        <!-- Name -->
        <dxi-item dataField="SpecialityName">
          <dxi-validation-rule
            type="required"
            message="Speciality Name is required"
          ></dxi-validation-rule>
        </dxi-item>

        <!-- Short Name -->
        <dxi-item
          dataField="SpecialityShortName"
          [label]="{ text: 'Short Name' }"
        >
          <dxi-validation-rule
            type="required"
            message="Short Name is required"
          ></dxi-validation-rule>
        </dxi-item>

        <!-- Description -->
        <dxi-item
          dataField="Description"
          editorType="dxTextArea"
          [colSpan]="2"
          [label]="{ text: 'Description' }"
          [editorOptions]="{
            height: 120,
          }"
        >
        </dxi-item>
        <!-- Billable Checkbox -->
        <dxi-item
          dataField="IsADOCExcluded"
          editorType="dxCheckBox"
          [label]="{ visible: false }"
          [editorOptions]="{
            text: 'ADOC Excluded',
          }"
        >
        </dxi-item>
      </dxo-form>
    </dxo-editing>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [displayMode]="displayMode"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="showInfo"
      [showNavigationButtons]="showNavButtons"
    >
    </dxo-pager>
    <dxo-load-panel [showPane]="false"></dxo-load-panel>
    <dxo-scrolling mode="virtual"></dxo-scrolling>
    <dxo-sorting mode="multiple"></dxo-sorting>
    <dxo-header-filter [visible]="isFilterRowVisible">
      <dxo-search [enabled]="true"></dxo-search>
    </dxo-header-filter>
    <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>
    <dxo-column-chooser [enabled]="false" [height]="400"></dxo-column-chooser>
    <dxo-search-panel [visible]="true" placeholder=" Search"></dxo-search-panel>

    <dxo-export
      [enabled]="true"
      [allowExportSelectedData]="false"
      [formats]="['xlsx']"
    >
    </dxo-export>

    <dxo-toolbar>
      <dxi-item location="before">
        <div class="grid-header">Speciality</div>
      </dxi-item>
      <dxi-item
        location="after"
        locateInMenu="auto"
        showText="inMenu"
        widget="dxButton"
        [options]="{
          icon: isFilterRowVisible ? 'filter' : 'filter',
          hint: isFilterRowVisible ? 'Hide Filter Row' : 'Show Filter Row',
          onClick: toggleFilterRow,
          stylingMode: 'text',
          elementAttr: { class: 'commonButtons' },
        }"
      ></dxi-item>
      <dxi-item
        location="after"
        locateInMenu="auto"
        showText="inMenu"
        widget="dxButton"
        [options]="{
          text: 'Refresh',
          icon: 'refresh',
          hint: 'refresh',
          onClick: refresh,
          stylingMode: 'text',
        }"
      ></dxi-item>

      <dxi-item
        name="exportButton"
        location="after"
        cssClass="custom-export-button"
      ></dxi-item>
      <dxi-item
        location="after"
        widget="dxButton"
        [options]="addButtonOptions"
      ></dxi-item>
    </dxo-toolbar>

    <dxi-column dataField="SpecialityCode" caption="Code"></dxi-column>
    <dxi-column dataField="SpecialityName" caption="Name"></dxi-column>
    <dxi-column
      dataField="SpecialityShortName"
      caption="Short Name"
    ></dxi-column>
    <dxi-column dataField="Description" caption="Description"></dxi-column>
    <dxi-column
      dataField="Billlable"
      [visible]="false"
      caption="Billable"
    ></dxi-column>
    <!-- <dxi-column dataField="IsBillable" caption="Billable"></dxi-column> -->
    <dxi-column
      dataField="IsADOCExcluded"
      caption="ADOCExcluded"
      dataType="boolean"
      [showEditorAlways]="false"
      cellTemplate="billableCell"
    ></dxi-column>
    <div *dxTemplate="let cell of 'billableCell'" class="billable-cell">
      <dx-check-box [value]="cell.value" [readOnly]="true"></dx-check-box>
    </div>
  </dx-data-grid>

  <form-popup
    class="formPopupClass"
    [(visible)]="isAddFormPopupOpened"
    (save)="onClickSaveNewData()"
    titleText="New Speciality"
    [height]="'auto'"
    [customValidate]="validateSpecialityForm"
  >
    <app-speciality-new-form></app-speciality-new-form>
  </form-popup>
</div>
