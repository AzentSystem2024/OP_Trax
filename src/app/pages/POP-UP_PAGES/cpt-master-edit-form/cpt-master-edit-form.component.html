<div
  *ngIf="!dropdownsLoaded"
  style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 550px;
    width: 100%;
  "
>
  <dx-load-indicator [visible]="true"></dx-load-indicator>
  <div style="margin-top: 10px; color: #666">Loading data...</div>
</div>

<div class="cpt-master-container" *ngIf="dropdownsLoaded">
  <!-- CPT Details Section -->
  <div class="section-card">
    <div class="section-title">CPT Information</div>
    <div class="section-body">
      <dx-form class="plain-styled-form no-padding-form">
        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="CPT Code"
                [(value)]="newCptMasterData.CPTCode"
                labelMode="floating"
                [readOnly]="true"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Code is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                label="CPT Type"
                labelMode="floating"
                [(value)]="newCptMasterData.CPTTypeID"
                [items]="CptType_DropDownData"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [searchEnabled]="true"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Type is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-select-box>
            </div>
          </dxi-item>

          <dxi-item [colSpan]="2">
            <div *dxTemplate>
              <dx-text-box
                label="CPT Name"
                [(value)]="newCptMasterData.CPTName"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Name is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item [colSpan]="2">
            <div class="d-flex align-items-center mt-2" *dxTemplate>
              <div
                class="me-4 text-muted"
                style="font-size: 13px; font-weight: 500; white-space: nowrap"
              >
                ADOC Application:
              </div>
              <dx-radio-group
                [items]="ADOCApplicationDataSource"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [(value)]="newCptMasterData.ADOCApplicationID"
                (onValueChanged)="onAdocApplicationChanged($event)"
                layout="horizontal"
                style="margin-bottom: 0"
              >
              </dx-radio-group>
            </div>
          </dxi-item>
        </dxi-item>
      </dx-form>
    </div>
  </div>

  <!-- Tabs Section -->
  <div class="section-card">
    <div class="grid-container">
      <div
        class="p-3 text-center text-muted"
        *ngIf="newCptMasterData.ADOCApplicationID !== 0"
        style="
          height: 350px;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        ADOC Mapping is not applicable.
      </div>
      <dx-data-grid
        *ngIf="newCptMasterData.ADOCApplicationID === 0"
        class="custom-grid"
        [dataSource]="newCptMasterData.CPTADOCMappings"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [showRowLines]="true"
        [showColumnLines]="false"
        (onEditorPreparing)="onEditorPreparingADOC($event)"
        (onInitNewRow)="onInitNewRowADOC($event)"
        (onRowValidating)="onRowValidatingADOC($event)"
        height="350"
      >
        <dxo-scrolling mode="virtual"></dxo-scrolling>
        <dxo-header-filter [visible]="true">
          <dxo-search [enabled]="true"></dxo-search>
        </dxo-header-filter>

        <dxo-toolbar>
          <dxi-item location="before">
            <div class="section-title" style="padding: 0; margin-bottom: 0">
              ADOC Mapping
            </div>
          </dxi-item>
          <dxi-item name="addRowButton"></dxi-item>
        </dxo-toolbar>
        <dxo-editing
          mode="cell"
          [allowUpdating]="true"
          [allowAdding]="true"
          [allowDeleting]="true"
          newRowPosition="last"
        >
        </dxo-editing>

        <!-- Specialty -->
        <dxi-column
          dataField="SpecialityID"
          caption="Specialty"
          [lookup]="{
            dataSource: specialityDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="Specialty is required"
          ></dxi-validation-rule>
        </dxi-column>

        <!-- ADOC Class -->
        <dxi-column
          dataField="ADOCClassID"
          caption="ADOC Class"
          [width]="180"
          [lookup]="{
            dataSource: allADOCClassDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="ADOC Class is required"
          ></dxi-validation-rule>
        </dxi-column>

        <!-- Auto Filled -->
        <dxi-column
          dataField="ADOCCategoryID"
          caption="ADOC Category"
          [allowEditing]="false"
          [width]="180"
          [lookup]="{
            dataSource: ADOCgroupDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
        </dxi-column>
        <dxi-column
          dataField="ICDCode"
          caption="ICD Code"
          dataType="string"
          [width]="180"
        ></dxi-column>
      </dx-data-grid>
    </div>
  </div>
</div>
