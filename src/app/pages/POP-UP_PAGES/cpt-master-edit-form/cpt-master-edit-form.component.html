<div class="cpt-master-container">
  <!-- CPT Details Section -->
  <div class="section-card">
    <div class="section-title">CPT Information</div>
    <div class="section-body">
      <dx-form class="plain-styled-form no-padding-form">
        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="CPT Code"
                [(value)]="newCptMasterData.CPTCode"
                labelMode="floating"
                [readOnly]="true"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Code is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                label="CPT Type"
                labelMode="floating"
                [(value)]="newCptMasterData.CPTTypeID"
                [items]="CptType_DropDownData"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [searchEnabled]="true"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Type is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-select-box>
            </div>
          </dxi-item>

          <dxi-item [colSpan]="2">
            <div *dxTemplate>
              <dx-text-box
                label="CPT Name"
                [(value)]="newCptMasterData.CPTName"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Name is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div class="mt-2" *dxTemplate>
              <dx-check-box
                text="ADOC Excluded"
                [(value)]="newCptMasterData.IsADOCExcluded"
                (onValueChanged)="onAdocExcludedChanged($event)"
              ></dx-check-box>
            </div>
          </dxi-item>
        </dxi-item>
      </dx-form>
    </div>
  </div>

  <!-- Tabs Section -->
  <div class="section-card">
    <dx-tabs
      #withText
      [width]="'auto'"
      [rtlEnabled]="false"
      [scrollByContent]="false"
      [showNavButtons]="false"
      [selectedIndex]="selectedTabIndex"
      [dataSource]="tabsWithText"
      [orientation]="'horizontal'"
      [stylingMode]="'secondary'"
      (onSelectionChanged)="onTabSelectionChanged($event)"
    ></dx-tabs>

    <div *ngIf="selectedTabIndex === 0" class="grid-container">
      <div
        class="p-3 text-center text-muted"
        *ngIf="newCptMasterData.IsADOCExcluded"
        style="
          height: 350px;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        ADOC Mapping is Excluded.
      </div>
      <dx-data-grid
        *ngIf="!newCptMasterData.IsADOCExcluded"
        class="custom-grid"
        [dataSource]="newCptMasterData.CPTADOCMappings"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [showRowLines]="true"
        [showColumnLines]="false"
        (onEditorPreparing)="onEditorPreparingADOC($event)"
        (onInitNewRow)="onInitNewRowADOC($event)"
        (onRowValidating)="onRowValidatingADOC($event)"
        height="350"
      >
        <dxo-scrolling mode="virtual"></dxo-scrolling>
        <dxo-header-filter [visible]="true">
          <dxo-search [enabled]="true"></dxo-search>
        </dxo-header-filter>
        <dxo-editing
          mode="cell"
          [allowUpdating]="!newCptMasterData.IsADOCExcluded"
          [allowAdding]="!newCptMasterData.IsADOCExcluded"
          [allowDeleting]="!newCptMasterData.IsADOCExcluded"
          newRowPosition="last"
        >
        </dxo-editing>

        <!-- Specialty -->
        <dxi-column
          dataField="SpecialityID"
          caption="Specialty"
          [width]="180"
          [lookup]="{
            dataSource: specialityDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="Specialty is required"
          ></dxi-validation-rule>
        </dxi-column>

        <!-- ADOC Class -->
        <dxi-column
          dataField="ADOCClassID"
          caption="ADOC Class"
          [width]="180"
          [lookup]="{
            dataSource: allADOCClassDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="ADOC Class is required"
          ></dxi-validation-rule>
        </dxi-column>

        <!-- Auto Filled -->
        <dxi-column
          dataField="ADOCCategoryID"
          caption="ADOC Category"
          [allowEditing]="false"
          [width]="180"
          [lookup]="{
            dataSource: ADOCgroupDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
        </dxi-column>
        <dxi-column
          dataField="ICDCode"
          caption="ICD Code"
          dataType="string"
          [width]="140"
        ></dxi-column>
        <!-- ADOC Application -->
        <dxi-column
          dataField="ADOCApplicationID"
          caption="ADOC Application"
          [width]="180"
          [editorOptions]="{ dropDownOptions: { width: 'auto' } }"
          [lookup]="{
            dataSource: ADOCApplicationDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
        </dxi-column>
      </dx-data-grid>
    </div>

    <div *ngIf="selectedTabIndex === 1" class="grid-container">
      <dx-data-grid
        class="custom-grid"
        [dataSource]="newCptMasterData.CPTPrices"
        (onRowPrepared)="onRowPreparedPrice($event)"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [showRowLines]="true"
        [showColumnLines]="false"
        height="350"
      >
        <dxi-column
          dataField="FacilityID"
          caption="Facility"
          [visible]="!IsPriceGlobal"
        ></dxi-column>
        <dxi-column
          dataField="Price"
          caption="Price"
          dataType="number"
          format="#,##0.00"
        ></dxi-column>

        <dxi-column
          dataField="EffectFrom"
          caption="Effective From"
        ></dxi-column>

        <dxi-column dataField="EffectTo" caption="Effective To"></dxi-column>
        <dxi-column dataField="CreatedTime" caption="Updated Time"></dxi-column>
      </dx-data-grid>
    </div>

    <div *ngIf="selectedTabIndex === 2" class="grid-container">
      <dx-data-grid
        class="custom-grid"
        [dataSource]="newCptMasterData.CPTWeightages"
        (onRowPrepared)="onRowPreparedWeightages($event)"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [showRowLines]="true"
        [showColumnLines]="false"
        height="350"
      >
        <dxi-column
          dataField="FacilityID"
          caption="Facility"
          [visible]="!IsWeightGlobal"
        ></dxi-column>
        <dxi-column
          dataField="Weightage"
          caption="Weightage"
          dataType="number"
        ></dxi-column>

        <dxi-column
          dataField="EffectFrom"
          caption="Effective From"
        ></dxi-column>

        <dxi-column dataField="EffectTo" caption="Effective To"></dxi-column>
        <dxi-column dataField="CreatedTime" caption="Updated Time"></dxi-column>
      </dx-data-grid>
    </div>
  </div>
</div>
