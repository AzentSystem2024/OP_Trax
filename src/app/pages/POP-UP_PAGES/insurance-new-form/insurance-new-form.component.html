<dx-form class="plain-styled-form" validationGroup="InsuranceValidation">
  <dxi-item itemType="group">
    <dxo-col-count-by-screen
      [xs]="1"
      [sm]="1"
      [md]="1"
      [lg]="1"
    ></dxo-col-count-by-screen>

    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          label="Insurance ID"
          [(value)]="newInsuranceData.InsuranceID"
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Insurance  Name is required"
            >
            </dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>

    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          label="Insurance Name"
          [(value)]="newInsuranceData.InsuranceName"
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Insurance  Name is required"
            >
            </dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>

    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          label="Insurance ShortName"
          [(value)]="newInsuranceData.InsuranceShortName"
        >
          <dx-validator>
            <dxi-validation-rule
              type="required"
              message="Insurance Short Name is required"
            >
            </dxi-validation-rule>
          </dx-validator>
        </dx-text-box>
      </div>
    </dxi-item>
    <dxi-item>
      <div *dxTemplate>
        <dx-select-box
          label="Insurance Classification"
          [dataSource]="insuranceClassificationList"
          displayExpr="DESCRIPTION"
          valueExpr="ID"
          [(value)]="newInsuranceData.ClassificationID"
          placeholder="Classification"
          [searchEnabled]="true"
        >
        </dx-select-box>
      </div>
    </dxi-item>
  </dxi-item>
</dx-form>
