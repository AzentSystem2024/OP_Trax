<div class="cpt-master-container">
  <!-- CPT Details Section -->
  <div class="section-card">
    <div class="section-title">CPT Information</div>
    <div class="section-body">
      <dx-form class="plain-styled-form no-padding-form">
        <dxi-item itemType="group" [colCount]="2">
          <dxi-item>
            <div *dxTemplate>
              <dx-text-box
                label="CPT Code"
                [(value)]="newCptMasterData.CPTCode"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Code is required"
                  ></dxi-validation-rule>

                  <dxi-validation-rule
                    type="async"
                    [validationCallback]="checkDuplicateCPTCode"
                    message="CPT Code already exists"
                  >
                  </dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>

          <dxi-item>
            <div *dxTemplate>
              <dx-select-box
                label="CPT Type"
                labelMode="floating"
                [(value)]="newCptMasterData.CPTTypeID"
                [items]="CptType_DropDownData"
                displayExpr="DESCRIPTION"
                valueExpr="ID"
                [searchEnabled]="true"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Type is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-select-box>
            </div>
          </dxi-item>

          <dxi-item [colSpan]="2">
            <div *dxTemplate>
              <dx-text-box
                label="CPT Name"
                [(value)]="newCptMasterData.CPTName"
                labelMode="floating"
              >
                <dx-validator>
                  <dxi-validation-rule
                    type="required"
                    message="CPT Name is required"
                  ></dxi-validation-rule>
                </dx-validator>
              </dx-text-box>
            </div>
          </dxi-item>


          <dxi-item>
            <div class="mt-2" *dxTemplate>
              <dx-check-box
                text="ADOC Excluded"
                [(value)]="newCptMasterData.IsADOCExcluded"
              ></dx-check-box>
            </div>
          </dxi-item>
        </dxi-item>
      </dx-form>
    </div>
  </div>

  <!-- Tabs Section -->
  <div class="section-card">
    <div
      class="p-3 text-center text-muted"
      *ngIf="newCptMasterData.IsADOCExcluded"
      style="
        height: 350px;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      ADOC Mapping is Excluded.
    </div>
    <div class="grid-container" *ngIf="!newCptMasterData.IsADOCExcluded">
      <dx-data-grid
        class="custom-grid"
        height="350"
        [dataSource]="newCptMasterData.CPTADOCMappings"
        [showBorders]="false"
        [columnAutoWidth]="true"
        [rowAlternationEnabled]="true"
        [hoverStateEnabled]="true"
        [showRowLines]="true"
        [showColumnLines]="false"
        (onEditorPreparing)="onEditorPreparingADOC($event)"
        (onRowRemoving)="onADOCRowRemoving($event)"
        (onInitNewRow)="onInitNewRowADOC($event)"
        (onRowValidating)="onRowValidatingADOC($event)"
      >
        <dxo-header-filter [visible]="true">
          <dxo-search [enabled]="true"></dxo-search>
        </dxo-header-filter>
        <dxo-scrolling mode="virtual"></dxo-scrolling>
        <dxo-editing
          mode="cell"
          [allowUpdating]="!newCptMasterData.IsADOCExcluded"
          [allowAdding]="!newCptMasterData.IsADOCExcluded"
          [allowDeleting]="!newCptMasterData.IsADOCExcluded"
          newRowPosition="last"
        >
        </dxo-editing>

        <!-- Specialty -->
        <dxi-column
          dataField="SpecialityID"
          caption="Specialty"
          [width]="200"
          [lookup]="{
            dataSource: specialityDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="Specialty is required"
          ></dxi-validation-rule>
        </dxi-column>

        <!-- ADOC Class -->
        <dxi-column
          dataField="ADOCClassID"
          caption="ADOC Class"
          [width]="200"
          [lookup]="{
            dataSource: allADOCClassDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
          <dxi-validation-rule
            type="required"
            message="ADOC Class is required"
          ></dxi-validation-rule>
        </dxi-column>

        <!-- Auto Filled -->
        <dxi-column
          dataField="ADOCCategoryID"
          caption="ADOC Category"
          [allowEditing]="false"
          [width]="180"
          [lookup]="{
            dataSource: ADOCgroupDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
        </dxi-column>

        <!-- ICD Code -->
        <dxi-column
          dataField="ICDCode"
          caption="ICD Code"
          dataType="string"
          [width]="140"
        >
        </dxi-column>
        <!-- ADOC Application -->
        <dxi-column
          dataField="ADOCApplicationID"
          caption="ADOC Application"
          [width]="180"
          [editorOptions]="{ dropDownOptions: { width: 'auto' } }"
          [lookup]="{
            dataSource: ADOCApplicationDataSource,
            valueExpr: 'ID',
            displayExpr: 'DESCRIPTION',
          }"
        >
        </dxi-column>
      </dx-data-grid>
    </div>
  </div>
</div>
