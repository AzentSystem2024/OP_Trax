<div class="clinical-data-root">
  <div class="view-wrapper">
    <div
      class="container-fluid toolbar-fields SearchParams-container mt-2"
      [ngClass]="{ 'hide-content': !isContentVisible }"
    >
      <dx-form>
        <!-- Row 1 -->
        <dxi-item
          itemType="group"
          cssClass="form-group"
          class="rowGroup"
          [colCount]="8"
          [colCountByScreen]="{ xs: 8, sm: 8, md: 8, lg: 8 }"
        >
          <dxi-item [colSpan]="4">
            <dx-drop-down-box
              label="Facility"
              labelMode="floating"
              labelLocation="left"
              [(value)]="selectedFacility"
              valueExpr="FacilityLicense"
              [displayExpr]="displayFacility"
              [showClearButton]="true"
              [dataSource]="facilityListDataSource"
              [dropDownOptions]="{ width: '400' }"
            >
              <div *dxTemplate="let data of 'content'">
                <dx-data-grid
                  #facilityGrid
                  [dataSource]="facilityListDataSource"
                  keyExpr="FacilityLicense"
                  [columns]="[
                    { dataField: 'FacilityLicense', caption: 'License' },
                    { dataField: 'FacilityName', caption: 'Name' },
                  ]"
                  [selection]="{ mode: 'multiple' }"
                  [hoverStateEnabled]="true"
                  [paging]="{ enabled: true, pageSize: 10 }"
                  [filterRow]="{ visible: true }"
                  [headerFilter]="{ visible: true }"
                  [scrolling]="{ mode: 'virtual' }"
                  [height]="'auto'"
                  [(selectedRowKeys)]="selectedFacility"
                ></dx-data-grid>
              </div>
            </dx-drop-down-box>
          </dxi-item>

          <dxi-item [colSpan]="4">
            <dx-text-box
              label="CPT Codes"
              labelMode="floating"
              [(value)]="cptCodes"
            ></dx-text-box>
          </dxi-item>
        </dxi-item>

        <!-- Row 2 -->
        <dxi-item
          itemType="group"
          cssClass="form-group"
          class="rowGroup mt-2"
          [colCount]="8"
          [colCountByScreen]="{ xs: 8, sm: 8, md: 8, lg: 8 }"
        >
          <dxi-item [colSpan]="1">
            <dx-select-box
              labelMode="floating"
              labelLocation="left"
              label="Year"
              [(value)]="selectedYear"
              [dataSource]="years"
              (onValueChanged)="onYearChanged($event)"
              placeholder="Year"
            ></dx-select-box>
          </dxi-item>

          <dxi-item [colSpan]="1">
            <dx-select-box
              labelMode="floating"
              labelLocation="left"
              label="month"
              [dataSource]="monthDataSource"
              displayExpr="name"
              valueExpr="value"
              [(value)]="selectedmonth"
              (onValueChanged)="onMonthValueChanged($event)"
            >
            </dx-select-box>
          </dxi-item>

          <dxi-item [colSpan]="2">
            <dx-date-box
              label="From Date"
              labelMode="floating"
              labelLocation="left"
              [(value)]="fromDate"
              [displayFormat]="'dd-MM-yyyy'"
              type="date"
              [min]="minDate"
              [max]="maxDate"
            >
            </dx-date-box>
          </dxi-item>

          <dxi-item [colSpan]="2">
            <dx-date-box
              label="To Date"
              labelMode="floating"
              labelLocation="left"
              [(value)]="toDate"
              [displayFormat]="'dd-MM-yyyy'"
              [min]="fromDate"
              [max]="today"
              type="date"
            >
            </dx-date-box>
          </dxi-item>

          <dxi-item [colSpan]="2" class="mt-1">
            <div class="d-flex justify-content-end align-items-center w-100">
              <dx-button
                text="Apply"
                icon=""
                class="add-card ms-2"
                type="default"
                [disabled]="isLookupLoading"
                (onClick)="onApplyFilter()"
              >
              </dx-button>
              
              <dx-button
                *ngIf="isLookupLoading"
                text="Cancel"
                type="danger"
                class="add-card ms-2"
                (onClick)="cancelApiCall()"
              >
              </dx-button>
            </div>
          </dxi-item>
        </dxi-item>
      </dx-form>
    </div>

    <div class="button-container mt-1 mb-2">
      <dx-button
        class="toggleButton"
        icon="{{ isContentVisible ? 'chevronup' : 'chevrondown' }}"
        stylingMode="outlined"
        type="normal"
        [hint]="
          isContentVisible ? 'Hide Filter Contend' : 'Show Filter Contend'
        "
        [width]="200"
        [height]="13"
        (onClick)="toggleContent()"
      >
      </dx-button>
    </div>

    <dx-data-grid
      [height]="isContentVisible ? '67vh' : '82vh'"
      class="grid theme-dependent"
      [noDataText]="!isContentVisible ? 'No Data Available' : ' '"
      [dataSource]="dataSource"
      [showBorders]="true"
      [showColumnLines]="true"
      [showRowLines]="true"
      [allowColumnResizing]="false"
      [allowColumnReordering]="true"
      [rowAlternationEnabled]="true"
      [columnAutoWidth]="true"
      rowAlternationInterval="2"
      [columnFixing]="{
        enabled: true,
        texts: { fix: 'Freeze', unfix: 'Unfreeze' },
      }"
      (onExporting)="onExporting($event)"
      (onSelectionChanged)="onSelectionChanged($event)"
      (onCellPrepared)="onCellPrepared($event)"
    >
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-editing
        mode="popup"
        [allowUpdating]="false"
        [allowDeleting]="false"
        [allowAdding]="true"
        [popup]="{ width: '35%', height: '70vh' }"
      >
      </dxo-editing>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [displayMode]="displayMode"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="showInfo"
        [showNavigationButtons]="showNavButtons"
      >
      </dxo-pager>
      <dxo-selection
        mode="multiple"
        showCheckBoxesMode="always"
      ></dxo-selection>
      <dxo-load-panel [showPane]="false"></dxo-load-panel>
      <dxo-scrolling mode="virtual"></dxo-scrolling>
      <dxo-sorting mode="multiple"></dxo-sorting>
      <dxo-header-filter [visible]="isFilterRowVisible"></dxo-header-filter>
      <dxo-filter-row [visible]="isFilterRowVisible"></dxo-filter-row>
      <dxo-filter-panel [visible]="isFilterRowVisible"></dxo-filter-panel>
      <dxo-filter-builder [allowHierarchicalFields]="true">
      </dxo-filter-builder>
      <dxo-search-panel
        [visible]="true"
        placeholder=" Search"
      ></dxo-search-panel>
      <dxo-grouping
        [autoExpandAll]="false"
        [contextMenuEnabled]="true"
        [expandMode]="'rowClick'"
      ></dxo-grouping>
      <dxo-export
        [enabled]="true"
        [allowExportSelectedData]="false"
        [formats]="['xlsx']"
      >
      </dxo-export>
      <dxo-toolbar>
        <dxi-item location="before">
          <div class="grid-header">Billing Info</div>
        </dxi-item>

        <dxi-item
          location="after"
          locateInMenu="auto"
          showText="inMenu"
          widget="dxButton"
          [options]="{
            icon: isFilterRowVisible ? 'filter' : 'filter',
            hint: isFilterRowVisible ? 'Hide Filter Row' : 'Show Filter Row',
            onClick: toggleFilterRow,
            stylingMode: 'text',
            elementAttr: { class: 'commonButtons' },
          }"
        ></dxi-item>
        <dxi-item
          location="after"
          locateInMenu="auto"
          showText="inMenu"
          widget="dxButton"
          [options]="{
            text: 'Refresh',
            icon: 'refresh',
            onClick: refresh,
            stylingMode: 'text',
            hint: 'Refresh',
          }"
        ></dxi-item>

        <dxi-item
          name="exportButton"
          location="after"
          cssClass="custom-export-button"
        ></dxi-item>

        <dxi-item
          name="processButton"
          location="after"
          widget="dxButton"
          [options]="processButtonOptions"
        ></dxi-item>

        <dxi-item
          location="after"
          widget="dxButton"
          [options]="addButtonOptions"
        ></dxi-item>
      </dxo-toolbar>

      <dxo-editing mode="cell" [allowUpdating]="true"></dxo-editing>

      <dxi-column
        dataField="FacilityID"
        caption="FacilityID"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="ClaimNumber"
        caption="Invoice No"
        [allowEditing]="false"
      ></dxi-column>

      <dxi-column
        dataField="TransactionDate"
        caption="Transaction Date"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="EncounterType"
        caption="Encounter Type"
        [allowEditing]="false"
      ></dxi-column>
      <dxi-column
        dataField="PatientID"
        caption="PatientID"
        [allowEditing]="false"
      ></dxi-column>

      <!-- <dxi-column
        dataField="Specialty"
        caption="Specialty"
        [allowEditing]="false"
      ></dxi-column> -->

      <dxi-column
        dataField="Status"
        caption="Grouper Status"
        [allowEditing]="false"
        cellTemplate="statusTemplate"
        alignment="center"
      ></dxi-column>
      <div *dxTemplate="let data of 'statusTemplate'">
        <div class="flag-container">
          <!-- Pending -->
          <span
            *ngIf="data.value?.toLowerCase() === 'pending'"
            class="status-flag pending-flag"
            title="Pending"
          >
            ⚑
          </span>

          <!-- Applied -->
          <span
            *ngIf="data.value?.toLowerCase() === 'applied'"
            class="status-flag applied-flag"
            title="Applied"
          >
            ⚑
          </span>
        </div>
      </div>

      <dxi-column type="buttons" [width]="100">
        <dxi-button
          hint="View"
          icon="errorcircle"
          text="View"
          [onClick]="onViewClick"
        >
        </dxi-button>
      </dxi-column>

      <dxo-summary>
        <dxi-total-item
          column="Amount"
          summaryType="sum"
          valueFormat="#,##0.00"
          displayFormat="Total: {0}"
          alignment="right"
        ></dxi-total-item>
      </dxo-summary>
    </dx-data-grid>

    <dx-load-panel
      #processLoadPanel
      [position]="{ of: '.grid' }"
      [visible]="isMultiProcessing"
      [showIndicator]="true"
      [showPane]="true"
      [shading]="true"
      [message]="processProgressMessage"
    ></dx-load-panel>
  </div>
  <!-- ============== import file popup ================= -->
  <dx-popup
    class="formPopupClass"
    [(visible)]="isAddFormPopupOpened"
    title="Select Import Option"
    [height]="'auto'"
    width="400"
    (onHidden)="CloseForm()"
  >
    <app-clinical-data-import-form (closeForm)="CloseForm()">
    </app-clinical-data-import-form>
  </dx-popup>

  <!-- ------------Row Detail Popup---------------- -->
  <app-adoc-detail-popup
    [(visible)]="isRowPopupVisible"
    [rowData]="selectedRowData"
    (cellClick)="onCellClick($event)"
    (dataLoaded)="onPopupDataLoaded($event)"
  ></app-adoc-detail-popup>

  <!-- ============Cpt code editing popup ============= -->
  <form-popup
    class="formPopupClass"
    [(visible)]="isCptEditFormPopupOpened"
    (save)="onClickUpdateNewCptType()"
    titleText="Edit CPT Master"
    [width]="'70%'"
    height="auto"
  >
    <app-cpt-master-edit-form
      *ngIf="isCptEditFormPopupOpened"
      [formData]="selectedCptCodeData"
    ></app-cpt-master-edit-form>
  </form-popup>
</div>

<dx-load-panel
  #loadPanel
  shadingColor="rgba(0,0,0,0.4)"
  [position]="{ of: '#dataGrid' }"
  [(visible)]="isLoading"
  [showIndicator]="true"
  [showPane]="true"
  [shading]="true"
  message="Loading..."
></dx-load-panel>
